# This workflow publishes the package to PyPI.
# It runs automatically when release-please publishes a GitHub Release, and can
# also be run manually (e.g. to re-run a failed publish) by navigating to
# https://www.github.com/cartesia-ai/cartesia-python/actions/workflows/publish-pypi.yml
name: Publish PyPI
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    # Guard so this only runs on the production repo — the file also exists in
    # the staging repo via promotion, and publishing must never happen there.
    if: github.repository == 'cartesia-ai/cartesia-python'
    environment: stainless-pypi-release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.9.13'

      - name: Publish to PyPI
        run: |
          bash ./bin/publish-pypi
